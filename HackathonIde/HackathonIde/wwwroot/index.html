<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnliSharpTeam IDE | Collaborative Coding</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-main: #141417;
            --bg-panel: #1e1e22;
            --bg-card: #2d2d33;
            --text-main: #ffffff;
            --color-ai: #00e5ff;
            --color-success: #33ffaa;
            --color-warning: #ffca28;
            --color-danger: #ff4d4d;
            --border-color: #3d3d45;
            --font-ui: 'Inter', sans-serif;
            --font-code: 'Fira Code', monospace;
        }

        body {
            height: 100vh;
            margin: 0;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-ui); /* ПРИМЕНЯЕМ ШРИФТ */
            overflow: hidden;
        }

        /* --- УВЕДОМЛЕНИЯ В СТИЛЕ WINDOWS 11 --- */
        #notification-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .win-notification {
            pointer-events: auto;
            width: 320px;
            background: rgba(30, 30, 34, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: slideIn 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .win-notification.error { border-left: 4px solid var(--color-danger); }
        .win-notification.success { border-left: 4px solid var(--color-success); }
        .win-notification.info { border-left: 4px solid var(--color-ai); }

        .win-content { flex: 1; }
        .win-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 2px; }
        .win-msg { font-size: 12px; color: #ccc; line-height: 1.4; }

        .win-close {
            background: transparent; border: none; color: #888;
            cursor: pointer; font-size: 18px; line-height: 1; transition: color 0.2s;
        }
        .win-close:hover { color: #fff; }

        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .win-notification.fade-out { animation: fadeOut 0.5s forwards; }
        @keyframes fadeOut { to { transform: translateX(20px); opacity: 0; } }

        /* --- ХЕДЕР --- */
        .user-header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px; padding: 0 25px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(20, 20, 23, 0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 1100;
        }

        .header-left-block { display: flex; align-items: center; height: 100%; }
        .header-logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; letter-spacing: 0.5px; color: #ffffff; text-transform: uppercase; }
        .header-logo i { color: var(--color-ai); font-size: 1.3rem; text-shadow: 0 0 10px rgba(0, 229, 255, 0.4); }
        .header-divider { width: 1px; height: 24px; background-color: rgba(255, 255, 255, 0.15); margin: 0 20px; }

        .user-profile { display: flex; align-items: center; gap: 8px; background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.2); padding: 4px 14px 4px 4px; border-radius: 20px; }
        .user-avatar { width: 26px; height: 26px; background: var(--color-ai); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .user-name { font-family: var(--font-code); font-size: 13px; font-weight: 600; color: var(--color-ai); }

        .btn-header-icon {
            width: 36px; height: 36px; border-radius: 50%; background: transparent;
            border: 1px solid rgba(0, 229, 255, 0.2); color: var(--color-ai);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease;
        }
        .btn-header-icon:hover { background: rgba(0, 229, 255, 0.1); border-color: var(--color-ai); box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); color: #fff; }
        .btn-header-icon.btn-warning-accent { border-color: rgba(255, 202, 40, 0.2); color: var(--color-warning); }
        .btn-header-icon.btn-warning-accent:hover { background: rgba(255, 202, 40, 0.1); border-color: var(--color-warning); box-shadow: 0 0 15px rgba(255, 202, 40, 0.3); }
        .btn-header-icon.btn-save-accent { border-color: rgba(51, 255, 170, 0.2); color: var(--color-success); }
        .btn-header-icon.btn-save-accent:hover { background: rgba(51, 255, 170, 0.1); border-color: var(--color-success); box-shadow: 0 0 15px rgba(51, 255, 170, 0.3); }

        /* --- КНОПКИ --- */
        .btn-ai-main, .btn-outline-custom { background: transparent; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 16px; width: 100%; border-radius: 6px; transition: all 0.2s ease-in-out; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-ai-main { color: var(--color-ai); border: 1px solid rgba(0, 229, 255, 0.4); }
        .btn-ai-main:hover { background: rgba(0, 229, 255, 0.1); border: 1px solid var(--color-ai); color: #fff; box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }
        .btn-outline-custom { color: var(--color-success); border: 1px solid rgba(51, 255, 170, 0.4); }
        .btn-outline-custom:hover { background: rgba(51, 255, 170, 0.1); border: 1px solid var(--color-success); color: #fff; box-shadow: 0 0 15px rgba(51, 255, 170, 0.3); }

        /* --- ЭКРАНЫ --- */
        .screen { display: none; height: 100vh; width: 100vw; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; z-index: 1000; background: var(--bg-main); }
        .screen.active { display: flex; }
        .auth-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 420px; }
        .form-control-custom { background: var(--bg-main) !important; border: 1px solid var(--border-color) !important; color: var(--text-main) !important; padding: 12px; margin-bottom: 1.2rem; font-size: 14px; }
        label.small { color: #ffffff !important; font-weight: 600; margin-bottom: 8px; display: block; }

        /* --- ЛЕЙАУТ IDE --- */
        .main-container { display: flex; height: 100vh; width: 100vw; padding-top: 60px; }
        .editor-section { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
        .editor-statusbar { height: 35px; background: #1a1a1d; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-size: 13px; color: #fff; }
        #editor { flex: 1; font-family: var(--font-code) !important; }
        .terminal-panel { height: 200px; background: #0c0c0e; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; }
        .side-panel { width: 350px; background: var(--bg-panel); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; min-width: 250px; flex-shrink: 0; }
        .panel-header { padding: 12px 15px; background: #26262b; color: var(--color-ai); font-weight: 800; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border-color); }

        .resizing-active { user-select: none !important; }

        .user-list-item { display: flex; align-items: center; gap: 10px; padding: 8px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .user-list-avatar { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--color-ai); }
        
        .ai-modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .ai-modal-content { background: var(--bg-panel); border: 1px solid var(--color-ai); padding: 25px; border-radius: 12px; max-width: 600px; width: 90%; box-shadow: 0 0 30px rgba(0, 229, 255, 0.2); }

        #win-confirm-modal.ai-modal { background: rgba(0, 0, 0, 0.9); }
        .win-modal-body { font-size: 14px; color: #ccc; margin: 15px 0 25px 0; line-height: 1.5; }
        .btn-danger-custom { background: transparent; border: 1px solid rgba(255, 77, 77, 0.4); color: var(--color-danger); font-weight: 700; padding: 10px 20px; border-radius: 6px; transition: all 0.2s; }
        .btn-danger-custom:hover { background: rgba(255, 77, 77, 0.1); border-color: var(--color-danger); box-shadow: 0 0 15px rgba(255, 77, 77, 0.3); color: #fff; }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div id="global-header" class="user-header" style="display: none;">
        <div class="header-left-block">
            <div class="header-logo"><i class="bi bi-braces"></i><span>OnliSharpTeam IDE</span></div>
            <div class="header-divider"></div>
            <div class="user-profile">
                <div class="user-avatar"><i class="bi bi-person-fill"></i></div>
                <span id="user-display" class="user-name">--</span>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button id="btn-header-save" class="btn-header-icon btn-save-accent" onclick="saveChanges()" title="Сохранить (Ctrl+S)" style="display:none;"><i class="bi bi-floppy"></i></button>
            <button id="btn-header-delete" class="btn-header-icon btn-warning-accent" onclick="deleteCurrentRoom()" title="Удалить проект" style="display:none;"><i class="bi bi-trash"></i></button>
            <button id="btn-header-leave" class="btn-header-icon" onclick="leaveRoom()" title="В лобби" style="display:none;"><i class="bi bi-door-closed"></i></button>
            <button class="btn-header-icon" onclick="logout()" title="Выйти"><i class="bi bi-power"></i></button>
        </div>
    </div>

    <div id="screen-auth" class="screen active">
        <div class="auth-card text-center">
            <h1 class="mb-4" style="color: var(--color-ai); font-weight: 800; font-size: 2.2rem;">OnliSharpTeam</h1>
            <div id="auth-form" class="text-start">
                <input type="text" id="auth-username" class="form-control form-control-custom" placeholder="Логин">
                <input type="password" id="auth-password" class="form-control form-control-custom" placeholder="Пароль">
                <button id="btn-main-auth" class="btn-ai-main mb-3" onclick="handleAuth()">ВОЙТИ</button>
                <div class="text-center"><a href="#" class="small text-info text-decoration-none" onclick="toggleAuthMode(event)">Нет аккаунта? Регистрация</a></div>
            </div>
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <div class="container" style="max-width: 900px;">
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="auth-card w-100">
                        <h4 class="mb-4 text-white">Новый проект</h4>
                        <input type="text" id="create-name" class="form-control form-control-custom" placeholder="Название">
                        <input type="password" id="create-pass" class="form-control form-control-custom" placeholder="Пароль">
                        <button class="btn-outline-custom" onclick="handleCreateProject()">СОЗДАТЬ</button>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="auth-card w-100">
                        <h4 class="mb-4 text-white">Войти в комнату</h4>
                        <input type="number" id="join-id" class="form-control form-control-custom" placeholder="ID">
                        <input type="password" id="join-pass" class="form-control form-control-custom" placeholder="Пароль">
                        <button class="btn-ai-main" onclick="handleJoinProject()">ПОДКЛЮЧИТЬСЯ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-ide" class="screen" style="align-items: stretch;">
        <div class="main-container">
            <div class="editor-section">
                <div class="editor-statusbar">
                    <div>Project ID: <span id="active-project-id" class="fw-bold">--</span></div>
                    <div>C# | <span class="text-success">Online</span></div>
                </div>
                <div id="editor"></div>
                <div id="resizer-v" style="height: 4px; background: var(--border-color); cursor: row-resize;"></div>
                <div class="terminal-panel" id="terminal-panel">
                    <div class="panel-header d-flex">
                        <span>TERMINAL</span>
                        <i class="bi bi-trash ms-auto" style="cursor:pointer" onclick="document.getElementById('terminal-output').innerHTML=''"></i>
                    </div>
                    <div id="terminal-output" class="p-3 small" style="font-family: var(--font-code); color: #ccc; overflow-y: auto;"></div>
                </div>
            </div>
            <div id="resizer-h" style="width: 4px; background: var(--border-color); cursor: col-resize;"></div>
            <div class="side-panel" id="side-panel">
                <div class="panel-header">ONLINE</div>
                <div id="user-list" style="max-height: 120px; overflow-y: auto;"></div>
                <div class="panel-header">AI ASSISTANT</div>
                <div id="ai-suggestions" class="p-3" style="flex:1; overflow-y:auto;"></div>
                <div class="panel-header">SYSTEM EVENTS</div>
                <div id="system-logs" class="p-2 small" style="height: 120px; overflow-y: auto;"></div>
                <div class="p-3">
                    <div class="d-flex gap-2 mb-2">
                        <button class="btn-ai-main flex-grow-1" onclick="sendUndo()"><i class="bi bi-arrow-counterclockwise"></i></button>
                        <button class="btn-ai-main flex-grow-1" onclick="sendRedo()"><i class="bi bi-arrow-clockwise"></i></button>
                    </div>
                    <button class="btn-ai-main mb-2" onclick="analyzeCode()">АНАЛИЗ AI</button>
                    <button class="btn-outline-custom w-100" onclick="runCode()">ЗАПУСТИТЬ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="ai-merge-modal" class="ai-modal">
        <div class="ai-modal-content">
            <h5 class="text-info mb-3">AI Слияние</h5>
            <pre id="ai-resolved-code" style="background:#000; padding:10px; color:var(--color-success); font-size:12px; max-height:200px; overflow:auto;"></pre>
            <div class="d-flex gap-2 mt-3">
                <button class="btn-outline-custom" onclick="applyAiResolution()">ПРИНЯТЬ</button>
                <button class="btn-ai-main" onclick="closeAiModal()">ОТКЛОНИТЬ</button>
            </div>
        </div>
    </div>

    <div id="win-confirm-modal" class="ai-modal">
        <div class="ai-modal-content">
            <h5 style="color: var(--color-warning);">Подтверждение</h5>
            <div id="win-confirm-msg" class="win-modal-body text-light my-3"></div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn-ai-main" onclick="closeConfirmModal()">ОТМЕНА</button>
                <button id="btn-confirm-ok" class="btn-danger-custom">УДАЛИТЬ</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
